# Alembic configuration (brief 07, C6).
#
# The database URL is NOT set here; it is read from the application settings
# (DATABASE_URL env var) in alembic/env.py so there is a single source of truth.
[alembic]
script_location = alembic
prepend_sys_path = .
# Use a date-ordered, slug-friendly filename for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
